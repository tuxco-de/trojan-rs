name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: trojan-rs
            asset_suffix: linux-amd64
            cross_compile: false
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact_name: trojan-rs
            asset_suffix: linux-arm64
            cross_compile: false
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: trojan-rs
            asset_suffix: darwin-amd64
            cross_compile: false
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: trojan-rs
            asset_suffix: darwin-arm64
            cross_compile: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: trojan-rs.exe
            asset_suffix: windows-amd64
            cross_compile: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install BoringSSL build dependencies
        if: startsWith(matrix.os, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang libclang-dev ninja-build

      - name: Install BoringSSL build dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install cmake ninja llvm
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> "$GITHUB_ENV"

      - name: Install BoringSSL build dependencies (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          choco install cmake ninja llvm nasm -y
          "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build client binary
        if: matrix.cross_compile == false
        run: cargo build --release --target ${{ matrix.target }} --no-default-features --features client

      - name: Build client binary (cross)
        if: matrix.cross_compile == true
        uses: houseabsolute/actions-rust-cross@v1
        with:
          command: build
          target: ${{ matrix.target }}
          args: "--release --no-default-features --features client"
          use-rust-cache: false

      - name: Rename client binary (Unix)
        if: matrix.os != 'windows-latest'
        run: mv target/${{ matrix.target }}/release/${{ matrix.artifact_name }} target/${{ matrix.target }}/release/trojan-rs-client

      - name: Rename client binary (Windows)
        if: matrix.os == 'windows-latest'
        run: mv target/${{ matrix.target }}/release/${{ matrix.artifact_name }} target/${{ matrix.target }}/release/trojan-rs-client.exe

      - name: Compress client binary (cross)
        if: matrix.cross_compile == true
        run: tar -C target/${{ matrix.target }}/release -czvf trojan-rs-client-${{ matrix.asset_suffix }}.tar.gz trojan-rs-client

      - name: Build server binary
        if: matrix.cross_compile == false
        run: cargo build --release --target ${{ matrix.target }} --no-default-features --features server

      - name: Build server binary (cross)
        if: matrix.cross_compile == true
        uses: houseabsolute/actions-rust-cross@v1
        with:
          command: build
          target: ${{ matrix.target }}
          args: "--release --no-default-features --features server"
          use-rust-cache: false

      - name: Rename server binary (Unix)
        if: matrix.os != 'windows-latest'
        run: mv target/${{ matrix.target }}/release/${{ matrix.artifact_name }} target/${{ matrix.target }}/release/trojan-rs-server

      - name: Rename server binary (Windows)
        if: matrix.os == 'windows-latest'
        run: mv target/${{ matrix.target }}/release/${{ matrix.artifact_name }} target/${{ matrix.target }}/release/trojan-rs-server.exe

      - name: Compress binaries (Unix)
        if: matrix.os != 'windows-latest' && matrix.cross_compile == false
        run: |
          cd target/${{ matrix.target }}/release
          tar -czvf ../../../trojan-rs-client-${{ matrix.asset_suffix }}.tar.gz trojan-rs-client
          tar -czvf ../../../trojan-rs-server-${{ matrix.asset_suffix }}.tar.gz trojan-rs-server
          cd ../../..

      - name: Compress server binary (cross)
        if: matrix.cross_compile == true
        run: tar -C target/${{ matrix.target }}/release -czvf trojan-rs-server-${{ matrix.asset_suffix }}.tar.gz trojan-rs-server

      - name: Compress binaries (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path trojan-rs-client.exe -DestinationPath ../../../trojan-rs-client-${{ matrix.asset_suffix }}.zip
          Compress-Archive -Path trojan-rs-server.exe -DestinationPath ../../../trojan-rs-server-${{ matrix.asset_suffix }}.zip
          cd ../../..

      - name: Upload binaries to release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            *.tar.gz
            *.zip

  build-musl:
    name: Build Musl ${{ matrix.asset_suffix }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_suffix: linux-musl-amd64
          - os: ubuntu-24.04-arm
            asset_suffix: linux-musl-arm64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build binaries in Alpine container
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace alpine:latest sh -c " \
            apk add --no-cache git rust cargo gcc g++ cmake make perl bash linux-headers clang clang-dev && \
            cargo build --release --no-default-features --features client && \
            mv target/release/trojan-rs target/release/trojan-rs-client && \
            cargo build --release --no-default-features --features server && \
            mv target/release/trojan-rs target/release/trojan-rs-server \
          "

      - name: Compress binaries
        run: |
          cd target/release
          tar -czvf ../../trojan-rs-client-${{ matrix.asset_suffix }}.tar.gz trojan-rs-client
          tar -czvf ../../trojan-rs-server-${{ matrix.asset_suffix }}.tar.gz trojan-rs-server
          cd ../..

      - name: Upload binaries to release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            *.tar.gz
