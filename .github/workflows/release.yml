name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  HOMEBREW_REQUIRE_TAP_TRUST: "1"

permissions:
  contents: write

jobs:
  validate-release:
    name: Validate release metadata
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Match Cargo version to tag
        shell: bash
        run: |
          set -euo pipefail
          package_version=$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -n 1)
          test -n "${package_version}"
          test "v${package_version}" = "${GITHUB_REF_NAME}"

  build:
    name: Build ${{ matrix.target }}
    needs: validate-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: trojan-rs
            asset_suffix: darwin-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: trojan-rs
            asset_suffix: darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: trojan-rs.exe
            asset_suffix: windows-amd64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install BoringSSL build dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install cmake ninja llvm
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> "$GITHUB_ENV"

      - name: Install BoringSSL build dependencies (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          choco install cmake ninja llvm nasm -y
          "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build server binary
        run: cargo build --release --locked --target ${{ matrix.target }} --no-default-features --features server

      - name: Rename server binary (Unix)
        if: matrix.os != 'windows-latest'
        run: mv target/${{ matrix.target }}/release/${{ matrix.artifact_name }} target/${{ matrix.target }}/release/trojan-rs-server

      - name: Rename server binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: Move-Item -LiteralPath "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" -Destination "target/${{ matrix.target }}/release/trojan-rs-server.exe"

      - name: Verify and compress binaries (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          set -euo pipefail
          cd target/${{ matrix.target }}/release
          ./trojan-rs-server --version
          tar -czf ../../../trojan-rs-server-${{ matrix.asset_suffix }}.tar.gz trojan-rs-server

      - name: Verify and compress binaries (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Set-Location "target/${{ matrix.target }}/release"
          ./trojan-rs-server.exe --version
          Compress-Archive -Path trojan-rs-server.exe -DestinationPath ../../../trojan-rs-server-${{ matrix.asset_suffix }}.zip

      - name: Upload packaged binaries
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.asset_suffix }}
          if-no-files-found: error
          retention-days: 1
          path: |
            trojan-rs-server-${{ matrix.asset_suffix }}.*

  build-musl:
    name: Build Musl ${{ matrix.asset_suffix }}
    needs: validate-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_suffix: linux-musl-amd64
          - os: ubuntu-24.04-arm
            asset_suffix: linux-musl-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build statically linked musl binaries
        run: |
          docker create -w /workspace --name musl_builder rust:alpine sh -euxc '
            apk add --no-cache binutils build-base clang clang-dev cmake git linux-headers ninja perl
            TARGET=$(rustc -vV | awk "/host:/ {print \$2}")
            chmod +x scripts/musl-rustc-wrapper.sh
            export RUSTC_WRAPPER=/workspace/scripts/musl-rustc-wrapper.sh

            cargo build --target "$TARGET" --release --locked --no-default-features --features server
            cp "target/$TARGET/release/trojan-rs" dist/trojan-rs-server
            file dist/trojan-rs-server
            tar -czf /trojan-rs-server.tar.gz -C dist trojan-rs-server
          '
          docker cp ${{ github.workspace }}/. musl_builder:/workspace/
          docker start -a musl_builder

          docker cp musl_builder:/trojan-rs-server.tar.gz ${{ github.workspace }}/trojan-rs-server-${{ matrix.asset_suffix }}.tar.gz
          docker rm musl_builder


      - name: Verify packaged musl binaries on Debian 12
        run: |
          docker run --rm -v "${{ github.workspace }}:/artifacts:ro" debian:12 sh -euxc '
            mkdir -p /tmp/server
            tar -xzf /artifacts/trojan-rs-server-${{ matrix.asset_suffix }}.tar.gz -C /tmp/server

            /tmp/server/trojan-rs-server --version
          '

      - name: Upload packaged binaries
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.asset_suffix }}
          if-no-files-found: error
          retention-days: 1
          path: |
            trojan-rs-server-${{ matrix.asset_suffix }}.tar.gz

  build-gnu-legacy:
    name: Build GNU ${{ matrix.asset_suffix }}
    needs: validate-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_suffix: linux-amd64
          - os: ubuntu-24.04-arm
            asset_suffix: linux-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build binaries against Debian 12 glibc
        run: |
          docker create -w /workspace --name gnu_builder rust:bookworm sh -euxc '
            apt-get update
            apt-get install -y --no-install-recommends build-essential cmake clang curl git libclang-dev ninja-build perl pkg-config

            cargo build --release --locked --no-default-features --features server
            cp target/release/trojan-rs dist/trojan-rs-server

            tar -czf /trojan-rs-server.tar.gz -C dist trojan-rs-server
          '
          docker cp ${{ github.workspace }}/. gnu_builder:/workspace/
          docker start -a gnu_builder

          docker cp gnu_builder:/trojan-rs-server.tar.gz ${{ github.workspace }}/trojan-rs-server-${{ matrix.asset_suffix }}.tar.gz
          docker rm gnu_builder

      - name: Verify packaged GNU binaries on Debian 12
        run: |
          docker run --rm -v "${{ github.workspace }}:/artifacts:ro" debian:12 sh -euxc '
            mkdir -p /tmp/server
            tar -xzf /artifacts/trojan-rs-server-${{ matrix.asset_suffix }}.tar.gz -C /tmp/server

            /tmp/server/trojan-rs-server --version
          '

      - name: Upload packaged binaries
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.asset_suffix }}
          if-no-files-found: error
          retention-days: 1
          path: |
            trojan-rs-server-${{ matrix.asset_suffix }}.tar.gz

  publish:
    name: Publish complete release
    needs:
      - build
      - build-musl
      - build-gnu-legacy
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged binaries
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Verify complete asset set
        shell: bash
        run: |
          set -euo pipefail
          expected=(
            trojan-rs-server-darwin-amd64.tar.gz
            trojan-rs-server-darwin-arm64.tar.gz
            trojan-rs-server-windows-amd64.zip
            trojan-rs-server-linux-amd64.tar.gz
            trojan-rs-server-linux-arm64.tar.gz
            trojan-rs-server-linux-musl-amd64.tar.gz
            trojan-rs-server-linux-musl-arm64.tar.gz
          )
          for asset in "${expected[@]}"; do
            test -s "dist/${asset}"
          done
          test "$(find dist -maxdepth 1 -type f | wc -l)" -eq "${#expected[@]}"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: dist/*
