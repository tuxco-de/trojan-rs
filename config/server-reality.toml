mode = "server"
log_level = "info"

# VLESS + REALITY over RAW TCP.
#
# Phase 1 limitations:
#   * REALITY is server-side only and pairs with [vless] (not [trojan]).
#   * The Xray/sing-box client MUST use an empty flow (no xtls-rprx-vision).
#   * [tls], [websocket] and [mux] cannot be combined with [reality].
#   * fingerprint-probe, XTLS Vision and ML-DSA are not implemented.

[vless]
users = ["d342d11e-d424-4583-b36e-524ab1f0afa4"]

[reality]
addr = "0.0.0.0:443"
# Real decoy site that authentication failures are forwarded to. It must support
# TLS 1.3 + HTTP/2 and its certificate SAN must cover every server_name below.
target = "www.microsoft.com:443"
server_names = ["www.microsoft.com"]
# X25519 private key (base64). Generate a key pair with `xray x25519` and put the
# private half here; configure the matching public half on the client.
private_key = "REPLACE_WITH_BASE64_X25519_PRIVATE_KEY"
# Accepted short IDs (hex, even length, <= 16 chars). "" allows clients with none.
short_ids = ["", "0123456789abcdef"]
# Optional: reject clients whose clock differs by more than this (0 disables).
# max_time_diff_secs = 0
# handshake_timeout_secs = 10
# max_client_hello_size = 16384
