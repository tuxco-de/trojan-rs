mode = "server"
log_level = "debug" # optional

[trojan]
password = "password"

# Use [vless] instead of [trojan] to enable VLESS over WSS.
# [vless]
# users = ["d342d11e-d424-4583-b36e-524ab1f0afa4"]
# handshake_timeout_secs = 10
# [vless.multiplex]
# enabled = true # sing-box multiplex (h2mux), enabled by default

[tls]
addr = "0.0.0.0:443"
sni = "example.com"
cert = "cert.pem"
key = "key.pem"
# handshake_timeout_secs = 10

# optional: serve fallback routes over HTTP/1.1 and HTTP/2 for ordinary HTTPS requests
[fallback]
page = "config/camouflage.html"
# optional: enables /dashboard and /api/status with HTTP Basic Auth user "admin"
# dashboard_password = "replace-with-a-strong-dashboard-password"
# request_timeout_secs = 10
# max_request_size = 8192

# optional
# [plaintext]
# addr = "127.0.0.1:12345"

# optional
# Native Trojan/TLS remains available on the same listener when enabled.
# [websocket]
# path = "/trojanpath"
# handshake_timeout_secs = 10
# max_handshake_size = 8192
# read_buffer_size = 16384
# write_buffer_size = 16384
# max_message_size = 1048576
# max_frame_size = 1048576
# max_write_buffer_size = 2097152
# max_write_frame_size = 16384
# keepalive_interval_secs = 30

# optional
# [mux]
