<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | Crafting the Future</title>
    <meta name="description" content="We are currently building something extraordinary. Stay tuned for our upcoming launch.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #030712;
            --surface: rgba(17, 24, 39, 0.6);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --primary: #3b82f6;
            --accent: #8b5cf6;
            --glow: rgba(139, 92, 246, 0.4);
            --radius: 20px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Background Orbs */
        .ambient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 0;
            animation: float 20s infinite ease-in-out alternate;
            pointer-events: none;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: var(--accent);
            top: -200px;
            left: -150px;
            opacity: 0.3;
        }

        .orb-2 {
            width: 600px;
            height: 600px;
            background: var(--primary);
            bottom: -250px;
            right: -200px;
            opacity: 0.25;
            animation-delay: -5s;
            animation-direction: alternate-reverse;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(80px, 50px) scale(1.1); }
            100% { transform: translate(-40px, 90px) scale(0.95); }
        }

        /* Glassmorphism Container */
        .container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 600px;
            background: var(--surface);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 4rem 3rem;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 40px var(--glow);
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Badge */
        .badge {
            display: inline-block;
            padding: 0.4rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 999px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        /* Typography */
        h1 {
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 1.2rem;
            background: linear-gradient(135deg, #ffffff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        p {
            font-size: 1.1rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }

        /* Notify Form */
        .notify-form {
            display: flex;
            gap: 0.5rem;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            position: relative;
        }

        input {
            flex: 1;
            padding: 1rem 1.2rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-main);
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input::placeholder {
            color: #6b7280;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
        }

        button {
            padding: 0 1.5rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.3);
        }

        button:active {
            transform: translateY(1px);
        }

        /* Footer */
        .footer {
            margin-top: 3rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            animation: fadeIn 1s ease-in 0.8s both;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .container {
                padding: 3rem 1.5rem;
            }
            .notify-form {
                flex-direction: column;
            }
            button {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>

    <!-- Ambient Orbs -->
    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>

    <main class="container">
        <div class="badge">Coming Soon</div>
        <h1>Something<br>Extraordinary</h1>
        <p>We're crafting a new digital experience. Enter your email to be the first to know when we launch.</p>
        
        <form class="notify-form" onsubmit="event.preventDefault(); alert('Thanks for subscribing!');">
            <input type="email" placeholder="Enter your email address" required id="email-input">
            <button type="submit">Notify Me</button>
        </form>
    </main>

    <div class="footer">
        &copy; <span id="year"></span> Our Project. All rights reserved.
    </div>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
